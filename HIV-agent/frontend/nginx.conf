server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /health { proxy_pass http://backend:8000; }
  location /metrics { proxy_pass http://backend:8000; }
  location /phase7 { proxy_pass http://backend:8000; }
  location /diseases { proxy_pass http://backend:8000; }
  location /context-options { proxy_pass http://backend:8000; }
  location /guidelines { proxy_pass http://backend:8000; }
  location /pageindex { proxy_pass http://backend:8000; }
  location /feedback { proxy_pass http://backend:8000; }
  location /chat { proxy_pass http://backend:8000; }
  location /sessions { proxy_pass http://backend:8000; }
  location /admin { proxy_pass http://backend:8000; }
  location /memory { proxy_pass http://backend:8000; }
  location /evidence { proxy_pass http://backend:8000; }
  location /terminology { proxy_pass http://backend:8000; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
