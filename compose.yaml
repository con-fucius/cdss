services:
  ambulance-cdss:
    build: ./ambulance-cdss
    ports:
      - "8000:8000"
    env_file:
      - ./ambulance-cdss/.env
    environment:
      # Override DATABASE_URL to use Docker service name instead of localhost
      DATABASE_URL: postgresql+asyncpg://ambulance_user:ambulance_pass@postgres:5432/ambulance_cdss_dev
      TRIAGE_RANKER_BASE_URL: http://triage-ranker:8100
      FACILITY_REGISTRY_BASE_URL: http://facility-mapper:8001
    depends_on:
      postgres:
        condition: service_healthy
      triage-ranker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  triage-ranker:
    build: ./triage-ranker
    ports:
      - "8100:8100"
    env_file:
      - ./triage-ranker/.env
    volumes:
      - triage-ranker-cache:/app/cache
      - ./triage-ranker/app/rules:/app/rules:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  facility-mapper:
    build: ./facility-mapper
    ports:
      - "8001:8001"
    env_file:
      - ./facility-mapper/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://facility_user:facility_pass@postgres:5432/facility_mapper_dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./postgres.env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ambulance-cdss
      - facility-mapper

volumes:
  postgres-data:
  triage-ranker-cache:
