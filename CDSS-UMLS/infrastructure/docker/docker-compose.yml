version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: umls_user
      POSTGRES_PASSWORD: umls_password
      POSTGRES_DB: umls_cdss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../etl/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umls_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant service - commented out if you're using an existing Qdrant instance
  # Uncomment and adjust ports if you want docker-compose to manage Qdrant
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"
  #     # Port 6334 (gRPC) removed - not needed for HTTP API
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   healthcheck:
  #     test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://umls_user:umls_password@postgres:5432/umls_cdss
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://host.docker.internal:6333
      # OPENAI_API_KEY and UMLS_API_KEY are now loaded from ../../.env via env_file
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # qdrant:
      #   condition: service_healthy
    volumes:
      - ../../api:/app/api
      - ../../logs:/app/logs

  etl:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.etl
    environment:
      DATABASE_URL: postgresql://umls_user:umls_password@postgres:5432/umls_cdss
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../data:/app/data
      - ../../etl:/app/etl

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

