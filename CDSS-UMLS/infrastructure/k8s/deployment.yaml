apiVersion: apps/v1
kind: Deployment
metadata:
  name: umls-cdss-api
  labels:
    app: umls-cdss-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: umls-cdss-api
  template:
    metadata:
      labels:
        app: umls-cdss-api
    spec:
      containers:
      - name: api
        image: umls-cdss-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: umls-cdss-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: umls-cdss-config
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: umls-cdss-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: umls-cdss-api-service
spec:
  selector:
    app: umls-cdss-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer

